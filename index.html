<!DOCTYPE html>
<html>
<head>
    <title>SantaOS v5.1</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Boot screen */
        #boot {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, #ff3333, #220000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        #boot p {
            margin-top: 10px;
            font-size: 16px;
            opacity: 0.8;
        }

        /* Login screen */
        #login {
            position: fixed;
            inset: 0;
            background: linear-gradient(#00111f, #00334d);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #login-box {
            background: #000000aa;
            padding: 20px 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 20px #000;
        }

        #login input {
            margin-top: 10px;
            padding: 5px 8px;
            border: 1px solid #aa0000;
            background: #220000;
            color: white;
        }

        #login button {
            margin-top: 10px;
            padding: 5px 15px;
            border: none;
            background: #aa0000;
            color: white;
            cursor: pointer;
        }

        /* Desktop */
        #desktop {
            position: fixed;
            inset: 0;
            background: linear-gradient(#00111f, #00334d);
            display: none;
        }

        /* Snow */
        .snow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(2px 2px at 10% 20%, #fff, transparent),
                radial-gradient(2px 2px at 80% 30%, #fff, transparent),
                radial-gradient(2px 2px at 50% 80%, #fff, transparent);
            background-size: 200px 200px;
            animation: snow 8s linear infinite;
            opacity: 0.7;
        }

        @keyframes snow {
            from { background-position: 0 0, 0 0, 0 0; }
            to   { background-position: 0 600px, 0 800px, 0 700px; }
        }

        /* Windows */
        .window {
            width: 420px;
            height: 300px;
            background: #220000;
            border: 2px solid #aa0000;
            position: absolute;
            top: 100px;
            left: 100px;
            display: none;
            box-shadow: 0 0 15px #000;
        }

        .titlebar {
            background: #aa0000;
            padding: 5px;
            cursor: move;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }

        .btn {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
        }

        .btn-close { background: #ff5555; }
        .btn-min { background: #ffcc00; }
        .btn-max { background: #55ff55; }

        /* Taskbar */
        .taskbar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 45px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 10px;
            color: white;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .logo {
            font-weight: bold;
            color: #ff3333;
        }

        .task-buttons {
            display: flex;
            gap: 10px;
            flex: 1;
            justify-content: center;
        }

        .task-btn {
            padding: 5px 10px;
            background: #222;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .task-btn img {
            width: 18px;
            height: 18px;
        }

        .task-btn.active {
            background: #aa0000;
        }

        .time {
            font-size: 12px;
            opacity: 0.8;
        }

        textarea {
            width: 95%;
            height: 80%;
            background: #330000;
            color: white;
            border: none;
            padding: 10px;
            resize: none;
            font-family: Consolas;
        }

        iframe {
            width: 100%;
            height: 85%;
            border: none;
        }

        table {
            width: 95%;
            margin: 10px;
            border-collapse: collapse;
        }

        td {
            border: 1px solid #aa0000;
            padding: 5px;
            background: #330000;
        }

        td[contenteditable="true"] {
            outline: none;
        }
    </style>
</head>
<body>

<div id="boot">
    <div>🎅 SantaOS</div>
    <p>Loading North Pole systems...</p>
</div>

<div id="login">
    <div id="login-box">
        <h2>Welcome to SantaOS</h2>
        <p>Elf username:</p>
        <input id="user" value="PJ">
        <br>
        <button onclick="login()">Enter</button>
    </div>
</div>

<div id="desktop">
    <div class="snow"></div>

    <!-- WINDOWS -->
    <div class="window" id="browser">
        <div class="titlebar" id="drag-browser">
            <span>SantaBrowser</span>
            <div class="btn-group">
                <div class="btn btn-min" onclick="minimizeApp('browser')"></div>
                <div class="btn btn-max" onclick="toggleFullscreen('browser')"></div>
                <div class="btn btn-close" onclick="closeApp('browser')"></div>
            </div>
        </div>
        <iframe src="https://www.bing.com"></iframe>
    </div>

    <div class="window" id="write">
        <div class="titlebar" id="drag-write">
            <span>SantaWrite</span>
            <div class="btn-group">
                <div class="btn btn-min" onclick="minimizeApp('write')"></div>
                <div class="btn btn-max" onclick="toggleFullscreen('write')"></div>
                <div class="btn btn-close" onclick="closeApp('write')"></div>
            </div>
        </div>
        <textarea>Welcome to SantaWrite 🎅</textarea>
    </div>

    <div class="window" id="presentation">
        <div class="titlebar" id="drag-presentation">
            <span>SantaPresentation</span>
            <div class="btn-group">
                <div class="btn btn-min" onclick="minimizeApp('presentation')"></div>
                <div class="btn btn-max" onclick="toggleFullscreen('presentation')"></div>
                <div class="btn btn-close" onclick="closeApp('presentation')"></div>
            </div>
        </div>
        <div style="padding: 10px;">
            <input id="slideTitle" style="width:95%;padding:5px;background:#330000;border:1px solid #aa0000;color:white;font-size:18px;" value="Slide Title">
            <textarea id="slideText" style="width:95%;height:65%;background:#330000;color:white;border:1px solid #aa0000;margin-top:10px;">Welcome to SantaOS Presentation!</textarea>
        </div>
    </div>

    <div class="window" id="cel">
        <div class="titlebar" id="drag-cel">
            <span>SantaCel</span>
            <div class="btn-group">
                <div class="btn btn-min" onclick="minimizeApp('cel')"></div>
                <div class="btn btn-max" onclick="toggleFullscreen('cel')"></div>
                <div class="btn btn-close" onclick="closeApp('cel')"></div>
            </div>
        </div>
        <table>
            <tr><td contenteditable="true">Gift</td><td contenteditable="true">Quantity</td></tr>
            <tr><td contenteditable="true">Toys</td><td contenteditable="true">120</td></tr>
            <tr><td contenteditable="true">Candy Canes</td><td contenteditable="true">300</td></tr>
        </table>
    </div>

    <div class="window" id="settings">
        <div class="titlebar" id="drag-settings">
            <span>Settings</span>
            <div class="btn-group">
                <div class="btn btn-min" onclick="minimizeApp('settings')"></div>
                <div class="btn btn-max" onclick="toggleFullscreen('settings')"></div>
                <div class="btn btn-close" onclick="closeApp('settings')"></div>
            </div>
        </div>
        <div style="padding: 10px;">
            <h3>SantaOS Settings</h3>
            <p>Theme: Christmas Red</p>
            <p>Version: 5.0</p>
            <p>Made by: PJ 🎅</p>
        </div>
    </div>

    <!-- TASKBAR (ICONS ADDED) -->
    <div class="taskbar">
        <div class="logo">🎅 SantaOS</div>

        <div class="task-buttons">
            <div class="task-btn" id="task-browser" onclick="toggleFromTask('browser')">
                <img src="https://cdn-icons-png.flaticon.com/128/3771/3771521.png">
                Browser
            </div>

            <div class="task-btn" id="task-write" onclick="toggleFromTask('write')">
                <img src="https://cdn-icons-png.flaticon.com/128/2327/2327248.png">
                Write
            </div>

            <div class="task-btn" id="task-presentation" onclick="toggleFromTask('presentation')">
                <img src="https://cdn-icons-png.flaticon.com/128/3497/3497143.png">
                Slides
            </div>

            <div class="task-btn" id="task-cel" onclick="toggleFromTask('cel')">
                <img src="https://cdn-icons-png.flaticon.com/128/9564/9564645.png">
                Cel
            </div>

            <div class="task-btn" id="task-settings" onclick="toggleFromTask('settings')">
                <img src="https://cdn-icons-png.flaticon.com/128/945/945147.png">
                Settings
            </div>
        </div>

        <div class="time" id="clock"></div>
    </div>
</div>

<script>
setTimeout(() => {
    document.getElementById('boot').style.display = 'none';
    document.getElementById('login').style.display = 'flex';
}, 2000);

function login() {
    document.getElementById('login').style.display = 'none';
    document.getElementById('desktop').style.display = 'block';
}

function updateClock() {
    document.getElementById("clock").innerText = new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);

let zIndexCounter = 10;

function openApp(id) {
    const win = document.getElementById(id);
    win.style.display = 'block';
    win.style.zIndex = ++zIndexCounter;
    document.getElementById('task-' + id).classList.add('active');
}

function closeApp(id) {
    document.getElementById(id).style.display = 'none';
    document.getElementById('task-' + id).classList.remove('active');
}

function minimizeApp(id) {
    document.getElementById(id).style.display = 'none';
}

function toggleFullscreen(id) {
    const win = document.getElementById(id);

    if (!win.classList.contains("full")) {
        win.dataset.top = win.style.top;
        win.dataset.left = win.style.left;
        win.dataset.width = win.style.width;
        win.dataset.height = win.style.height;

        win.style.top = "0";
        win.style.left = "0";
        win.style.width = "100%";
        win.style.height = "calc(100% - 45px)";
        win.classList.add("full");
    } else {
        win.style.top = win.dataset.top;
        win.style.left = win.dataset.left;
        win.style.width = win.dataset.width;
        win.style.height = win.dataset.height;
        win.classList.remove("full");
    }
}

function toggleFromTask(id) {
    const win = document.getElementById(id);
    if (win.style.display === 'none' || win.style.display === '') openApp(id);
    else closeApp(id);
}

/* Drag */
function makeDraggable(winId, dragId) {
    let win = document.getElementById(winId);
    let drag = document.getElementById(dragId);
    let offsetX, offsetY;

    drag.onmousedown = function(e) {
        offsetX = e.clientX - win.offsetLeft;
        offsetY = e.clientY - win.offsetTop;
        win.style.zIndex = ++zIndexCounter;

        document.onmousemove = function(e) {
            win.style.left = (e.clientX - offsetX) + "px";
            win.style.top = (e.clientY - offsetY) + "px";
        }

        document.onmouseup = function() {
            document.onmousemove = null;
        }
    }
}

makeDraggable("browser", "drag-browser");
makeDraggable("write", "drag-write");
makeDraggable("presentation", "drag-presentation");
makeDraggable("cel", "drag-cel");
makeDraggable("settings", "drag-settings");
</script>

</body>
</html>
